server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip static assets for faster loads.
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback: serve index.html for client-side routes so deep links work.
    # The app talks to the backend directly at VITE_API_BASE_URL, so no API
    # proxy is configured here.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }
}
